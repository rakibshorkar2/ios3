name: Build iOS IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32'
  LIBTORRENT_SDK_VERSION: '0.2.3'

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Download LibtorrentNative XCFramework
        run: |
          set -euo pipefail
          mkdir -p ios/Frameworks
          FRAMEWORK_URL="https://github.com/tryAGI/LibtorrentSDK/releases/download/v${{ env.LIBTORRENT_SDK_VERSION }}/LibtorrentNative.xcframework.zip"
          echo "::group::Downloading LibtorrentNative.xcframework v${{ env.LIBTORRENT_SDK_VERSION }}"
          echo "URL: $FRAMEWORK_URL"
          curl -fSL -o LibtorrentNative.xcframework.zip "$FRAMEWORK_URL"
          echo "Download complete ($(stat -f%z LibtorrentNative.xcframework.zip) bytes)"

          echo "Extracting to ios/Frameworks/"
          unzip -o -q LibtorrentNative.xcframework.zip -d ios/Frameworks/
          rm LibtorrentNative.xcframework.zip
          echo "::endgroup::"

      - name: Validate XCFramework contains iOS device slice
        run: |
          set -euo pipefail
          XCFW="ios/Frameworks/LibtorrentNative.xcframework"

          if [ ! -f "$XCFW/Info.plist" ]; then
            echo "::error::XCFramework Info.plist not found at $XCFW/Info.plist"
            exit 1
          fi

          DEVICE_SLICE="$XCFW/ios-arm64"
          if [ ! -d "$DEVICE_SLICE" ]; then
            echo "::error::Missing ios-arm64 device slice!"
            echo "Found slices:"
            ls -d "$XCFW"/*/
            exit 1
          fi

          DEVICE_BINARY="$DEVICE_SLICE/LibtorrentNative.framework/LibtorrentNative"
          if [ ! -f "$DEVICE_BINARY" ]; then
            echo "::error::Device framework binary not found at $DEVICE_BINARY"
            ls -R "$DEVICE_SLICE" 2>/dev/null || true
            exit 1
          fi

          ARCHS=$(xcrun lipo -info "$DEVICE_BINARY" 2>/dev/null | grep -o "arm64" | head -1 || true)
          if [ "$ARCHS" != "arm64" ]; then
            echo "::error::Device binary missing arm64 architecture!"
            xcrun lipo -info "$DEVICE_BINARY" || echo "lipo failed"
            exit 1
          fi
          echo "✓ Device slice ($DEVICE_SLICE) confirmed: $(xcrun lipo -info "$DEVICE_BINARY" | sed 's/.*: //')"

          SIM_SLICE="$XCFW/ios-arm64_x86_64-simulator"
          if [ -d "$SIM_SLICE" ]; then
            SIM_BINARY="$SIM_SLICE/LibtorrentNative.framework/LibtorrentNative"
            if [ -f "$SIM_BINARY" ]; then
              echo "✓ Simulator slice confirmed: $(xcrun lipo -info "$SIM_BINARY" | sed 's/.*: //')"
            fi
          else
            echo "⚠ Simulator slice not found — building for simulator will fail, but device builds are fine."
          fi

          echo "XCFramework validation passed."

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: |
          cd ios
          pod install

      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign

      - name: Verify and fix framework embedding in .app
        run: |
          set -euo pipefail
          APP_BUNDLE="build/ios/iphoneos/Runner.app"
          FW_DEST="$APP_BUNDLE/Frameworks/LibtorrentNative.framework"
          echo "::group::Checking framework embedding in .app bundle"

          if [ -d "$FW_DEST" ]; then
            echo "✓ CocoaPods embedded LibtorrentNative.framework at $FW_DEST"
            echo "Framework contents:"
            ls -la "$FW_DEST/"
            xcrun lipo -info "$FW_DEST/LibtorrentNative" 2>/dev/null || echo "  (lipo check skipped)"
          else
            echo "⚠ CocoaPods did NOT embed LibtorrentNative.framework — manually copying"
            echo "App Frameworks directory contents:"
            ls -la "$APP_BUNDLE/Frameworks/" 2>/dev/null || echo "  (no Frameworks directory exists)"

            mkdir -p "$APP_BUNDLE/Frameworks"
            cp -R "ios/Frameworks/LibtorrentNative.xcframework/ios-arm64/LibtorrentNative.framework" "$APP_BUNDLE/Frameworks/"
            echo "Framework manually copied to $FW_DEST"
          fi

          echo "::endgroup::"

      - name: Verify framework in .app
        run: |
          set -euo pipefail
          FW_PATH="build/ios/iphoneos/Runner.app/Frameworks/LibtorrentNative.framework"
          if [ ! -d "$FW_PATH" ]; then
            echo "::error::LibtorrentNative.framework is MISSING from Runner.app after all fixes!"
            exit 1
          fi
          echo "✓ LibtorrentNative.framework present in Runner.app"
          xcrun lipo -info "$FW_PATH/LibtorrentNative" 2>/dev/null || echo "  (lipo info unavailable)"

      - name: Export IPA
        run: |
          set -euo pipefail
          APP_BUNDLE="build/ios/iphoneos/Runner.app"
          mkdir -p build/ipa/Payload
          cp -R "$APP_BUNDLE" build/ipa/Payload/
          cd build/ipa
          zip -r ../dirxplore.ipa Payload
          echo "IPA created: $(ls -lh ../dirxplore.ipa | awk '{print $5}')"

      - name: Validate IPA contains framework
        run: |
          set -euo pipefail
          echo "::group::Validating IPA contents"
          unzip -l build/dirxplore.ipa | grep -E "Frameworks/LibtorrentNative" || {
            echo "::error::LibtorrentNative.framework NOT found in IPA!"
            echo "IPA contents (Frameworks):"
            unzip -l build/dirxplore.ipa | grep "Frameworks/" || echo "  (no Frameworks in IPA at all)"
            exit 1
          }
          echo "✓ LibtorrentNative.framework confirmed inside IPA"
          echo "::endgroup::"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: dirxplore-ios-ipa
          path: build/dirxplore.ipa
          if-no-files-found: error
