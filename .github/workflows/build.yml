name: Build iOS IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.32'
  LIBTORRENT_SDK_VERSION: '0.2.3'

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Download LibtorrentNative XCFramework
        run: |
          set -euo pipefail
          mkdir -p ios/Frameworks
          FRAMEWORK_URL="https://github.com/tryAGI/LibtorrentSDK/releases/download/v${{ env.LIBTORRENT_SDK_VERSION }}/LibtorrentNative.xcframework.zip"
          echo "::group::Downloading LibtorrentNative.xcframework v${{ env.LIBTORRENT_SDK_VERSION }}"
          echo "URL: $FRAMEWORK_URL"
          curl -fSL -o LibtorrentNative.xcframework.zip "$FRAMEWORK_URL"
          echo "Download complete ($(stat -f%z LibtorrentNative.xcframework.zip) bytes)"

          echo "Extracting to ios/Frameworks/"
          unzip -o -q LibtorrentNative.xcframework.zip -d ios/Frameworks/
          rm LibtorrentNative.xcframework.zip
          echo "::endgroup::"

      - name: Validate XCFramework contains iOS device slice
        run: |
          set -euo pipefail
          XCFW="ios/Frameworks/LibtorrentNative.xcframework"

          # Check top-level Info.plist exists
          if [ ! -f "$XCFW/Info.plist" ]; then
            echo "::error::XCFramework Info.plist not found at $XCFW/Info.plist"
            echo "The downloaded archive may be corrupt or not a valid XCFramework."
            exit 1
          fi

          # Check for ios-arm64 device slice directory
          DEVICE_SLICE="$XCFW/ios-arm64"
          if [ ! -d "$DEVICE_SLICE" ]; then
            echo "::error::Missing ios-arm64 device slice!"
            echo "Expected directory: $DEVICE_SLICE"
            echo "Found slices:"
            ls -d "$XCFW"/*/
            echo ""
            echo "This XCFramework does not contain an iOS device slice."
            echo "It will build for the simulator but FAIL at runtime on real iPhones."
            exit 1
          fi

          # Verify the device framework binary exists and has arm64
          DEVICE_BINARY="$DEVICE_SLICE/LibtorrentNative.framework/LibtorrentNative"
          if [ ! -f "$DEVICE_BINARY" ]; then
            echo "::error::Device framework binary not found at $DEVICE_BINARY"
            ls -R "$DEVICE_SLICE" 2>/dev/null || true
            exit 1
          fi

          # Use lipo to confirm architecture
          ARCHS=$(xcrun lipo -info "$DEVICE_BINARY" 2>/dev/null | grep -o "arm64" | head -1 || true)
          if [ "$ARCHS" != "arm64" ]; then
            echo "::error::Device binary missing arm64 architecture!"
            xcrun lipo -info "$DEVICE_BINARY" || echo "lipo failed"
            exit 1
          fi
          echo "✓ Device slice ($DEVICE_SLICE) confirmed: $(xcrun lipo -info "$DEVICE_BINARY" | sed 's/.*: //')"

          # Check for simulator slice (warn, but don't fail)
          SIM_SLICE="$XCFW/ios-arm64_x86_64-simulator"
          if [ -d "$SIM_SLICE" ]; then
            SIM_BINARY="$SIM_SLICE/LibtorrentNative.framework/LibtorrentNative"
            if [ -f "$SIM_BINARY" ]; then
              echo "✓ Simulator slice confirmed: $(xcrun lipo -info "$SIM_BINARY" | sed 's/.*: //')"
            fi
          else
            echo "⚠ Simulator slice not found — building for simulator will fail, but device builds are fine."
          fi

          echo "XCFramework validation passed."

      - name: Flutter pub get
        run: flutter pub get

      - name: Pod install
        run: |
          cd ios
          pod install

      - name: Build unsigned IPA
        run: |
          flutter build ios --release --no-codesign

      - name: Export IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ipa/Payload/
          cd build/ipa
          zip -r ../dirxplore.ipa Payload
          ls -lh ../dirxplore.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: dirxplore-ios-ipa
          path: build/dirxplore.ipa
          if-no-files-found: error
